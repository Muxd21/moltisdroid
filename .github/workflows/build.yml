name: Build Moltis for Termux (Native ARM64)

on:
  schedule:
    - cron: '0 0,6,12,18 * * *'
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Build without publishing"
        required: false
        default: false
        type: boolean

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  check-release:
    name: Check for New Release
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.check.outputs.tag }}
      version: ${{ steps.check.outputs.version }}
    steps:
      - name: Check latest moltis release
        id: check
        run: |
          LATEST=$(curl -s https://api.github.com/repos/moltis-org/moltis/releases/latest)
          TAG=$(echo "$LATEST" | jq -r '.tag_name')
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=${TAG#v}" >> "$GITHUB_OUTPUT"

  build-musl:
    name: Build Static Musl (Native ARM)
    needs: check-release
    runs-on: ubuntu-24.04-arm
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y musl-tools clang llvm cmake make pkg-config libssl-dev jq build-essential

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Clone Moltis Source
        run: |
          git clone --depth 1 --branch "${{ needs.check-release.outputs.tag }}" https://github.com/moltis-org/moltis.git moltis-src
          cd moltis-src
          rustup target add aarch64-unknown-linux-musl
          rustup target add wasm32-wasip2

      - name: Build WASM/Static
        env:
          CC: musl-gcc
          OPENSSL_STATIC: 1
          RUSTFLAGS: "-C target-feature=+crt-static"
        run: |
          cd moltis-src
          cargo build --target wasm32-wasip2 -p moltis-wasm-calc -p moltis-wasm-web-fetch -p moltis-wasm-web-search --release || true
          cargo run -p moltis-wasm-precompile --release || true
          cargo build --release --target aarch64-unknown-linux-musl --bin moltis

      - name: Package Musl
        run: |
          cd moltis-src/target/aarch64-unknown-linux-musl/release
          TAG="${{ needs.check-release.outputs.tag }}"
          VERSION="${{ needs.check-release.outputs.version }}"
          mkdir -p moltis-termux
          cp moltis moltis-termux/
          tar -czvf "moltis-${VERSION}-musl-arm64.tar.gz" moltis-termux/
          cp "moltis-${VERSION}-musl-arm64.tar.gz" "moltis-musl-arm64.tar.gz"

      - name: Upload Musl Artifact
        uses: actions/upload-artifact@v4
        with:
          name: moltis-musl
          path: moltis-src/target/aarch64-unknown-linux-musl/release/*.tar.gz

  build-bionic:
    name: Build Native Bionic (x64 Host)
    needs: check-release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup NDK
        id: setup-ndk
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r26b

      - name: Install cargo-ndk
        run: cargo install cargo-ndk

      - name: Clone & Build Bionic
        env:
          ANDROID_NDK_HOME: ${{ steps.setup-ndk.outputs.ndk-path }}
          CARGO_NDK_ANDROID_PLATFORM: 26
        run: |
          git clone --depth 1 --branch "${{ needs.check-release.outputs.tag }}" https://github.com/moltis-org/moltis.git moltis-src
          cd moltis-src
          rustup target add aarch64-linux-android
          # Bionic build doesn't need static flags, it uses Android sysroot
          cargo ndk -t aarch64-linux-android -- build --release -p moltis

      - name: Package Bionic
        run: |
          cd moltis-src/target/aarch64-linux-android/release
          TAG="${{ needs.check-release.outputs.tag }}"
          VERSION="${{ needs.check-release.outputs.version }}"
          mkdir -p moltis-termux
          cp moltis moltis-termux/
          tar -czvf "moltis-${VERSION}-bionic-arm64.tar.gz" moltis-termux/

      - name: Upload Bionic Artifact
        uses: actions/upload-artifact@v4
        with:
          name: moltis-bionic
          path: moltis-src/target/aarch64-linux-android/release/*.tar.gz

  release:
    name: Publish Release
    needs: [check-release, build-musl, build-bionic]
    runs-on: ubuntu-latest
    if: success() && github.event.inputs.dry_run != 'true'
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./release-assets
          merge-multiple: true

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ needs.check-release.outputs.tag }}
          VERSION: ${{ needs.check-release.outputs.version }}
        run: |
          if gh release view "${TAG}-termux" &>/dev/null; then
            gh release delete "${TAG}-termux" --yes --cleanup-tag
          fi
          
          gh release create "${TAG}-termux" \
            --title "Moltis ${VERSION} (Termux Native)" \
            --notes "Moltis builds for Termux. 
            - Static Musl: Universal compatibility.
            - Native Bionic: Maximum performance.
            Source: moltis-org/moltis@${TAG}" \
            --target master \
            ./release-assets/*
