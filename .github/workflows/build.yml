name: Build Moltis for Termux

on:
  push:
    branches:
      - master
  schedule:
    - cron: '0 0,6,12,18 * * *'
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Build without publishing"
        required: false
        default: false
        type: boolean

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  build:
    name: Build Native ARM64 (Termux)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Android NDK
        id: setup-ndk
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r26b

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-ndk
        run: cargo install cargo-ndk

      - name: Check latest moltis release
        id: check
        run: |
          LATEST=$(curl -s https://api.github.com/repos/moltis-org/moltis/releases/latest)
          TAG=$(echo "$LATEST" | jq -r '.tag_name')
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=${TAG#v}" >> "$GITHUB_OUTPUT"

      - name: Clone Moltis Source
        run: |
          git clone --depth 1 --branch "${{ steps.check.outputs.tag }}" https://github.com/moltis-org/moltis.git moltis-src
          cd moltis-src
          rustup target add aarch64-linux-android
          rustup target add wasm32-wasip2

      - name: Build WASM & Precompile
        run: |
          cd moltis-src
          cargo build --target wasm32-wasip2 -p moltis-wasm-calc -p moltis-wasm-web-fetch -p moltis-wasm-web-search --release || true
          cargo run -p moltis-wasm-precompile --release || true

      - name: Build Android Binary (Native Bionic)
        env:
          ANDROID_NDK_HOME: ${{ steps.setup-ndk.outputs.ndk-path }}
          ANDROID_NDK_ROOT: ${{ steps.setup-ndk.outputs.ndk-path }}
          NDK_HOME: ${{ steps.setup-ndk.outputs.ndk-path }}
          CARGO_NDK_ANDROID_PLATFORM: 26
          CFLAGS_aarch64_linux_android: "-DPOSIX_MADV_WILLNEED=MADV_WILLNEED -DPOSIX_MADV_RANDOM=MADV_RANDOM"
          CXXFLAGS_aarch64_linux_android: "-DPOSIX_MADV_WILLNEED=MADV_WILLNEED -DPOSIX_MADV_RANDOM=MADV_RANDOM"
        run: |
          cd moltis-src
          cargo ndk -t aarch64-linux-android -p 26 build --release -p moltis

      - name: Package
        run: |
          cd moltis-src/target/aarch64-linux-android/release
          TAG="${{ steps.check.outputs.tag }}"
          VERSION="${{ steps.check.outputs.version }}"
          
          mkdir -p moltis-termux
          cp moltis moltis-termux/
          chmod +x moltis-termux/moltis
          
          # Clean, unified naming
          tar -czvf "moltis-${VERSION}-termux-aarch64.tar.gz" moltis-termux/
          cp "moltis-${VERSION}-termux-aarch64.tar.gz" "moltis-termux-aarch64.tar.gz"

      - name: Create Release
        if: github.event.inputs.dry_run != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.check.outputs.tag }}
          VERSION: ${{ steps.check.outputs.version }}
        run: |
          cd moltis-src/target/aarch64-linux-android/release
          
          if gh release view "${TAG}-termux" &>/dev/null; then
            gh release delete "${TAG}-termux" --yes --cleanup-tag
          fi
          
          gh release create "${TAG}-termux" \
            --title "Moltis ${VERSION} (Termux Edition)" \
            --notes "Native Termux build. Direct linkage to Android libc for maximum performance. Source: moltis-org/moltis@${TAG}" \
            --target master \
            ./*.tar.gz
