name: Build Moltis for Termux (Native ARM64)

on:
  schedule:
    - cron: '0 0,6,12,18 * * *'
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Build without publishing"
        required: false
        default: false
        type: boolean

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  build:
    name: Build Native ARM64 (Musl)
    runs-on: ubuntu-24.04-arm
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            musl-tools \
            clang \
            llvm \
            cmake \
            make \
            pkg-config \
            libssl-dev \
            jq \
            build-essential

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Check latest moltis release
        id: check
        run: |
          LATEST=$(curl -s https://api.github.com/repos/moltis-org/moltis/releases/latest)
          TAG=$(echo "$LATEST" | jq -r '.tag_name')
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=${TAG#v}" >> "$GITHUB_OUTPUT"

      - name: Clone Moltis Source
        run: |
          git clone --depth 1 --branch "${{ steps.check.outputs.tag }}" https://github.com/moltis-org/moltis.git moltis-src
          cd moltis-src
          rustup target add aarch64-unknown-linux-musl
          rustup target add wasm32-wasip2

      - name: Build WASM & Precompile
        run: |
          cd moltis-src
          cargo build --target wasm32-wasip2 -p moltis-wasm-calc -p moltis-wasm-web-fetch -p moltis-wasm-web-search --release || true
          cargo run -p moltis-wasm-precompile --release || true

      - name: Build Static Binary
        env:
          CC: musl-gcc
          OPENSSL_STATIC: 1
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_MUSL_LINKER: musl-gcc
          RUSTFLAGS: "-C target-feature=+crt-static"
        run: |
          cd moltis-src
          cargo build --release --target aarch64-unknown-linux-musl --bin moltis

      - name: Package
        run: |
          cd moltis-src/target/aarch64-unknown-linux-musl/release
          TAG="${{ steps.check.outputs.tag }}"
          VERSION="${{ steps.check.outputs.version }}"
          
          mkdir -p moltis-termux
          cp moltis moltis-termux/
          chmod +x moltis-termux/moltis
          
          # Versioned archive
          tar -czvf "moltis-${VERSION}-musl-arm64.tar.gz" moltis-termux/
          # Version-less for one-liner
          cp "moltis-${VERSION}-musl-arm64.tar.gz" "moltis-musl-arm64.tar.gz"

      - name: Create Release
        if: github.event.inputs.dry_run != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.check.outputs.tag }}
          VERSION: ${{ steps.check.outputs.version }}
        run: |
          cd moltis-src/target/aarch64-unknown-linux-musl/release
          
          if gh release view "${TAG}-termux" &>/dev/null; then
            gh release delete "${TAG}-termux" --yes --cleanup-tag
          fi
          
          gh release create "${TAG}-termux" \
            --title "Moltis ${VERSION} (Native ARM64)" \
            --notes "Statically linked musl binary for Termux. Zero dependencies. Source: moltis-org/moltis@${TAG}" \
            --target master \
            ./*.tar.gz
