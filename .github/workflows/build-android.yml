name: Build Moltis for Termux (Android Bionic)

on:
  schedule:
    # Runs 4 times a day at 00:00, 06:00, 12:00, 18:00 UTC
    - cron: '0 0,6,12,18 * * *'
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Build without uploading artifacts"
        required: false
        default: false
        type: boolean

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  check-release:
    name: Check for New Release
    runs-on: ubuntu-latest
    outputs:
      has_new_release: ${{ steps.check.outputs.has_new_release }}
      release_tag: ${{ steps.check.outputs.release_tag }}
      release_version: ${{ steps.check.outputs.release_version }}
    steps:
      - name: Check latest release from moltis-org/moltis
        id: check
        run: |
          # Get latest release info from GitHub API
          LATEST_RELEASE=$(curl -s https://api.github.com/repos/moltis-org/moltis/releases/latest)
          
          LATEST_TAG=$(echo "$LATEST_RELEASE" | jq -r '.tag_name')
          
          # Get stored version from artifact or use empty string
          STORED_VERSION=""
          if [ -f .stored_version ]; then
            STORED_VERSION=$(cat .stored_version)
          fi
          
          echo "Latest tag: $LATEST_TAG"
          echo "Stored version: $STORED_VERSION"
          
          if [ "$LATEST_TAG" != "$STORED_VERSION" ] && [ "$LATEST_TAG" != "null" ]; then
            echo "has_new_release=true" >> "$GITHUB_OUTPUT"
            echo "release_tag=$LATEST_TAG" >> "$GITHUB_OUTPUT"
            VERSION="${LATEST_TAG#v}"
            echo "release_version=$VERSION" >> "$GITHUB_OUTPUT"
            echo "$LATEST_TAG" > .stored_version
          else
            echo "has_new_release=false" >> "$GITHUB_OUTPUT"
            echo "release_tag=$LATEST_TAG" >> "$GITHUB_OUTPUT"
            VERSION="${LATEST_TAG#v}"
            echo "release_version=$VERSION" >> "$GITHUB_OUTPUT"
          fi

      - name: Store version for next check
        if: steps.check.outputs.has_new_release == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: stored_version
          path: .stored_version
          retention-days: 30

  build-android:
    name: Build aarch64-linux-android
    needs: check-release
    if: needs.check-release.outputs.has_new_release == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout build repo
        uses: actions/checkout@v4

      - name: Setup Android NDK
        id: setup-ndk
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r26b

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang llvm cmake pkg-config libssl-dev jq

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-ndk
        run: cargo install cargo-ndk

      - name: Checkout moltis source at release tag
        env:
          RELEASE_TAG: ${{ needs.check-release.outputs.release_tag }}
        run: |
          TAG=$RELEASE_TAG
          if [ -z "$TAG" ] || [ "$TAG" == "null" ]; then
            TAG=$(curl -s https://api.github.com/repos/moltis-org/moltis/releases/latest | jq -r '.tag_name')
          fi
          git clone --depth 1 --branch "$TAG" https://github.com/moltis-org/moltis.git moltis-src
          cd moltis-src
          git fetch --tags
          git checkout "$TAG"
          # Crucially add the target to the toolchain mandated by the project
          rustup target add aarch64-linux-android

      - name: Build Tailwind CSS
        run: |
          cd moltis-src
          curl -LO https://github.com/tailwindlabs/tailwindcss/releases/download/v3.4.17/tailwindcss-linux-x64
          chmod +x tailwindcss-linux-x64
          cd crates/web/ui && TAILWINDCSS=../../../tailwindcss-linux-x64 ./build.sh || echo "Tailwind build skipped"

      - name: Build WASM components
        run: |
          cd moltis-src
          rustup target add wasm32-wasip2
          cargo build --target wasm32-wasip2 -p moltis-wasm-calc -p moltis-wasm-web-fetch -p moltis-wasm-web-search --release || echo "WASM build skipped"
          cargo run -p moltis-wasm-precompile --release || echo "WASM precompile skipped"

      - name: Build Android binary
        env:
          ANDROID_NDK_HOME: ${{ steps.setup-ndk.outputs.ndk-path }}
        run: |
          cd moltis-src
          # Build with Android target using Bionic libc
          cargo ndk -t aarch64-linux-android build --release -p moltis

      - name: Verify binary
        run: |
          cd moltis-src
          ls -lh target/aarch64-linux-android/release/moltis
          file target/aarch64-linux-android/release/moltis
          # Check it's linked against Bionic/Android libs
          readelf -d target/aarch64-linux-android/release/moltis | grep "Shared library" || echo "Static or unknown"

      - name: Create release archive
        env:
          RELEASE_TAG: ${{ needs.check-release.outputs.release_tag }}
        run: |
          cd moltis-src/target/aarch64-linux-android/release
          TAG=$RELEASE_TAG
          if [ -z "$TAG" ] || [ "$TAG" == "null" ]; then
             TAG=$(curl -s https://api.github.com/repos/moltis-org/moltis/releases/latest | jq -r '.tag_name')
          fi
          VERSION="${TAG#v}"
          mkdir -p moltis-termux
          cp moltis moltis-termux/
          chmod +x moltis-termux/moltis
          tar -czvf "moltis-${VERSION}-aarch64-linux-android.tar.gz" moltis-termux/
          sha256sum "moltis-${VERSION}-aarch64-linux-android.tar.gz" > "moltis-${VERSION}-aarch64-linux-android.tar.gz.sha256"
          ls -lh

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: moltis-termux-aarch64-android
          path: moltis-src/target/aarch64-linux-android/release/*.tar.gz*
          retention-days: 30

  publish-release:
    name: Publish to GitHub Releases
    needs: [check-release, build-android]
    if: |
      always() && 
      (needs.check-release.outputs.has_new_release == 'true' || github.event_name == 'workflow_dispatch') &&
      needs.build-android.result == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download binary
        uses: actions/download-artifact@v4
        with:
          name: moltis-termux-aarch64-android
          path: ./release-assets

      - name: Get version info
        id: version
        run: |
          RELEASE_TAG="${{ needs.check-release.outputs.release_tag }}"
          if [ -z "$RELEASE_TAG" ] || [ "$RELEASE_TAG" == "null" ]; then
             RELEASE_TAG=$(curl -s https://api.github.com/repos/moltis-org/moltis/releases/latest | jq -r '.tag_name')
          fi
          echo "release_tag=$RELEASE_TAG" >> "$GITHUB_OUTPUT"
          VERSION="${RELEASE_TAG#v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ steps.version.outputs.release_tag }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          # Check if release already exists
          if gh release view "$RELEASE_TAG-termux" &>/dev/null; then
            echo "Release $RELEASE_TAG-termux already exists, deleting..."
            gh release delete "$RELEASE_TAG-termux" --yes --cleanup-tag
          fi
          
          # Create new release
          gh release create "$RELEASE_TAG-termux" \
            --title "Moltis $VERSION (Termux Android Bionic)" \
            --notes "Native Android Bionic build for Termux (aarch64-linux-android). This build is linked against Android Bionic libc and runs natively in Termux with zero overhead. Built from moltis-org/moltis release: $RELEASE_TAG" \
            --target master \
            ./release-assets/*
