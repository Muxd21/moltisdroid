name: Build Moltis for Termux (Android Bionic)

on:
  schedule:
    - cron: '0 0,6,12,18 * * *'
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Build without uploading artifacts"
        required: false
        default: false
        type: boolean

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  check-release:
    name: Check for New Release
    runs-on: ubuntu-latest
    outputs:
      has_new_release: ${{ steps.check.outputs.has_new_release }}
      release_tag: ${{ steps.check.outputs.release_tag }}
    steps:
      - name: Check latest release from moltis-org/moltis
        id: check
        run: |
          LATEST_RELEASE=$(curl -s https://api.github.com/repos/moltis-org/moltis/releases/latest)
          LATEST_TAG=$(echo "$LATEST_RELEASE" | jq -r '.tag_name')
          
          STORED_VERSION=""
          if [ -f .stored_version ]; then
            STORED_VERSION=$(cat .stored_version)
          fi
          
          if [ "$LATEST_TAG" != "$STORED_VERSION" ] && [ "$LATEST_TAG" != "null" ]; then
            echo "has_new_release=true" >> "$GITHUB_OUTPUT"
            echo "release_tag=$LATEST_TAG" >> "$GITHUB_OUTPUT"
            echo "$LATEST_TAG" > .stored_version
          else
            echo "has_new_release=false" >> "$GITHUB_OUTPUT"
            echo "release_tag=$LATEST_TAG" >> "$GITHUB_OUTPUT"
          fi

      - name: Store version for next check
        if: steps.check.outputs.has_new_release == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: stored_version
          path: .stored_version
          retention-days: 30

  build-android:
    name: Build aarch64-linux-android
    needs: check-release
    if: needs.check-release.outputs.has_new_release == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout build repo
        uses: actions/checkout@v4

      - name: Setup Android NDK
        id: setup-ndk
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r26b

      - name: Sync NDK Environment
        run: |
          # Ensure all NDK variables point to the same location to avoid CMake confusion
          echo "ANDROID_NDK_HOME=${{ steps.setup-ndk.outputs.ndk-path }}" >> $GITHUB_ENV
          echo "ANDROID_NDK_ROOT=${{ steps.setup-ndk.outputs.ndk-path }}" >> $GITHUB_ENV
          echo "NDK_HOME=${{ steps.setup-ndk.outputs.ndk-path }}" >> $GITHUB_ENV

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang llvm cmake pkg-config libssl-dev jq build-essential

      - name: Checkout moltis source at release tag
        run: |
          TAG=${{ needs.check-release.outputs.release_tag }}
          if [ -z "$TAG" ] || [ "$TAG" == "null" ]; then
            TAG=$(curl -s https://api.github.com/repos/moltis-org/moltis/releases/latest | jq -r '.tag_name')
          fi
          git clone --depth 1 --branch "$TAG" https://github.com/moltis-org/moltis.git moltis-src
          cd moltis-src
          
          # Initialize rustup based on the project's toolchain
          # This ensures we add the target to the correct toolchain version
          rustup target add aarch64-linux-android

      - name: Install cargo-ndk
        run: cargo install cargo-ndk

      - name: Pre-build WASM tools
        run: |
          cd moltis-src
          # Precompile needs host target
          rustup target add wasm32-wasip2
          cargo build --target wasm32-wasip2 -p moltis-wasm-calc -p moltis-wasm-web-fetch -p moltis-wasm-web-search --release || echo "WASM build skipped"
          cargo run -p moltis-wasm-precompile --release || echo "WASM precompile skipped"

      - name: Build Android binary (Native Bionic)
        run: |
          cd moltis-src
          # Use --android-platform instead of -p to avoid confusion with cargo's --package flag
          cargo ndk -t aarch64-linux-android --android-platform 24 build --release -p moltis

      - name: Create release archive
        run: |
          cd moltis-src/target/aarch64-linux-android/release
          # Identify version
          TAG=${{ needs.check-release.outputs.release_tag }}
          if [ -z "$TAG" ] || [ "$TAG" == "null" ]; then
             TAG=$(curl -s https://api.github.com/repos/moltis-org/moltis/releases/latest | jq -r '.tag_name')
          fi
          VERSION="${TAG#v}"
          
          mkdir -p moltis-termux
          cp moltis moltis-termux/
          chmod +x moltis-termux/moltis
          tar -czvf "moltis-${VERSION}-aarch64-linux-android.tar.gz" moltis-termux/
          sha256sum "moltis-${VERSION}-aarch64-linux-android.tar.gz" > "moltis-${VERSION}-aarch64-linux-android.tar.gz.sha256"

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: moltis-termux-aarch64-android
          path: moltis-src/target/aarch64-linux-android/release/*.tar.gz*
          retention-days: 30

  publish-release:
    name: Publish to GitHub Releases
    needs: [check-release, build-android]
    if: |
      always() && 
      (needs.check-release.outputs.has_new_release == 'true' || github.event_name == 'workflow_dispatch') &&
      needs.build-android.result == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download binary
        uses: actions/download-artifact@v4
        with:
          name: moltis-termux-aarch64-android
          path: ./release-assets

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG=${{ needs.check-release.outputs.release_tag }}
          if [ -z "$TAG" ] || [ "$TAG" == "null" ]; then
             TAG=$(curl -s https://api.github.com/repos/moltis-org/moltis/releases/latest | jq -r '.tag_name')
          fi
          VERSION="${TAG#v}"
          
          if gh release view "$TAG-termux" &>/dev/null; then
            gh release delete "$TAG-termux" --yes --cleanup-tag
          fi
          
          gh release create "$TAG-termux" \
            --title "Moltis $VERSION (Termux Android Bionic)" \
            --notes "Native Android Bionic build for Termux (aarch64-linux-android). Built from moltis-org/moltis release: $TAG" \
            --target master \
            ./release-assets/*
